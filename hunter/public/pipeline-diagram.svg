<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="support-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a"/>
      <stop offset="100%" style="stop-color:#1a5c57"/>
    </linearGradient>
    <linearGradient id="research-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1764"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4DCFC9"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#4DCFC9">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
    <marker id="arrowhead-down" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto" fill="#4DCFC9">
      <polygon points="0 0, 6 0, 3 8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.05em">HUNTER PIPELINE</text>
  <text x="480" y="54" text-anchor="middle" fill="#64748b" font-size="11" letter-spacing="0.15em">SIGNAL  ·  DECISION  ·  PERSONA  ·  OFFER  ·  PITCH  ·  SHIP</text>

  <!-- ═══ CORE PIPELINE ROW ═══ -->

  <!-- Signal Scan -->
  <rect x="20" y="80" width="120" height="72" rx="8" fill="url(#core-grad)" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="80" y="108" text-anchor="middle" fill="#4DCFC9" font-size="18">&#x1F4E1;</text>
  <text x="80" y="126" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">signal-scan</text>
  <text x="80" y="142" text-anchor="middle" fill="#64748b" font-size="9">Stage 1 · Signals</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="116" x2="168" y2="116" stroke="#4DCFC9" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Decision Log -->
  <rect x="172" y="80" width="120" height="72" rx="8" fill="url(#core-grad)" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="232" y="108" text-anchor="middle" fill="#4DCFC9" font-size="18">&#x2696;&#xFE0F;</text>
  <text x="232" y="126" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">decision-log</text>
  <text x="232" y="142" text-anchor="middle" fill="#64748b" font-size="9">Stage 2 · Decide</text>

  <!-- Arrow 2→3 -->
  <line x1="292" y1="116" x2="320" y2="116" stroke="#4DCFC9" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Persona Extract -->
  <rect x="324" y="80" width="120" height="72" rx="8" fill="url(#core-grad)" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="384" y="108" text-anchor="middle" fill="#4DCFC9" font-size="18">&#x1F464;</text>
  <text x="384" y="126" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">persona-extract</text>
  <text x="384" y="142" text-anchor="middle" fill="#64748b" font-size="9">Stage 3 · Personas</text>

  <!-- Arrow 3→4 -->
  <line x1="444" y1="116" x2="472" y2="116" stroke="#4DCFC9" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Offer Scope -->
  <rect x="476" y="80" width="120" height="72" rx="8" fill="url(#core-grad)" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="536" y="108" text-anchor="middle" fill="#4DCFC9" font-size="18">&#x1F3AF;</text>
  <text x="536" y="126" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">offer-scope</text>
  <text x="536" y="142" text-anchor="middle" fill="#64748b" font-size="9">Stage 4 · Scope</text>

  <!-- Arrow 4→5 -->
  <line x1="596" y1="116" x2="624" y2="116" stroke="#4DCFC9" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Pitch -->
  <rect x="628" y="80" width="120" height="72" rx="8" fill="url(#core-grad)" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="688" y="108" text-anchor="middle" fill="#4DCFC9" font-size="18">&#x1F680;</text>
  <text x="688" y="126" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">pitch</text>
  <text x="688" y="142" text-anchor="middle" fill="#64748b" font-size="9">Stage 5 · Launch Kit</text>

  <!-- Arrow 5→6 -->
  <line x1="748" y1="116" x2="776" y2="116" stroke="#4DCFC9" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Hunter Log -->
  <rect x="780" y="80" width="120" height="72" rx="8" fill="url(#core-grad)" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="840" y="108" text-anchor="middle" fill="#4DCFC9" font-size="18">&#x1F4D2;</text>
  <text x="840" y="126" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">hunter-log</text>
  <text x="840" y="142" text-anchor="middle" fill="#64748b" font-size="9">Persistence</text>

  <!-- ═══ SWOT BRANCH (down from persona) ═══ -->
  <line x1="384" y1="152" x2="384" y2="178" stroke="#4DCFC9" stroke-width="1.5" marker-end="url(#arrowhead-down)"/>

  <rect x="324" y="182" width="120" height="56" rx="8" fill="url(#core-grad)" filter="url(#shadow)" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="384" y="206" text-anchor="middle" fill="#4DCFC9" font-size="14">&#x1F50D;</text>
  <text x="384" y="222" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">swot-analysis</text>
  <text x="384" y="234" text-anchor="middle" fill="#475569" font-size="8">(optional)</text>

  <!-- ═══ OUTPUT SKILLS (down from pitch) ═══ -->
  <line x1="688" y1="152" x2="688" y2="178" stroke="#4DCFC9" stroke-width="1.5" marker-end="url(#arrowhead-down)"/>

  <rect x="608" y="182" width="280" height="112" rx="8" fill="url(#support-grad)" filter="url(#shadow)" stroke="#2dd4bf" stroke-width="1" stroke-opacity="0.3"/>
  <text x="748" y="202" text-anchor="middle" fill="#2dd4bf" font-size="10" font-weight="600" letter-spacing="0.1em">OUTPUT SKILLS</text>

  <text x="648" y="224" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F3AC; slidev-deck</text>
  <text x="648" y="242" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F310; landing-page</text>
  <text x="648" y="260" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F4C4; one-pager</text>
  <text x="800" y="224" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F3A8; design-pass</text>
  <text x="800" y="242" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F3AD; narrative-pass</text>

  <!-- ═══ RESEARCH SKILLS (left column) ═══ -->
  <rect x="20" y="182" width="140" height="112" rx="8" fill="url(#research-grad)" filter="url(#shadow)" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="90" y="202" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600" letter-spacing="0.1em">RESEARCH</text>
  <text x="40" y="224" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F3AF; wild-scan</text>
  <text x="40" y="242" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F4E1; reddit-harvest</text>
  <text x="40" y="260" text-anchor="start" fill="#e2e8f0" font-size="10">&#x1F52C; quote-to-persona</text>
  <text x="90" y="282" text-anchor="middle" fill="#7c3aed" font-size="8">feeds persona-extract</text>

  <!-- Arrow from research to persona -->
  <line x1="160" y1="230" x2="324" y2="116" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>

  <!-- ═══ ENVELOPE CONTRACT BAR ═══ -->
  <rect x="20" y="320" width="880" height="48" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="480" y="340" text-anchor="middle" fill="#4DCFC9" font-size="10" font-weight="600" letter-spacing="0.1em">PIPELINE ENVELOPE CONTRACT</text>
  <text x="160" y="358" text-anchor="middle" fill="#64748b" font-size="9">skill: enum</text>
  <text x="320" y="358" text-anchor="middle" fill="#64748b" font-size="9">version: "1.0"</text>
  <text x="480" y="358" text-anchor="middle" fill="#64748b" font-size="9">session_id: string</text>
  <text x="640" y="358" text-anchor="middle" fill="#64748b" font-size="9">input_refs: string[]</text>
  <text x="800" y="358" text-anchor="middle" fill="#64748b" font-size="9">output: object</text>

  <!-- ═══ VAULT BAR ═══ -->
  <rect x="20" y="380" width="880" height="32" rx="6" fill="#0c1525" stroke="#1e3a5f" stroke-width="1"/>
  <text x="480" y="401" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="500">&#x1F4C1; Obsidian Vault (vault-as-database) &mdash; folders = tables &middot; frontmatter = schema &middot; wikilinks = foreign keys &middot; dataview = SQL</text>
</svg>
